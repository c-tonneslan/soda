name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          name="soda-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w" -o "dist/${name}" ./cmd/soda
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      checksums: ${{ steps.checksum.outputs.checksums }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: collect + checksums
        id: checksum
        run: |
          mkdir -p dist
          find artifacts -type f -exec mv {} dist/ \;
          cd dist
          # Bundle each binary as a tar.gz for Homebrew
          for f in soda-*; do
            case "$f" in
              *.tar.gz|*.sha256) continue ;;
              *.exe) zip -q "${f%.exe}.zip" "$f"; rm "$f" ;;
              *) tar -czf "$f.tar.gz" "$f"; rm "$f" ;;
            esac
          done
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS
          echo 'checksums<<EOF' >> $GITHUB_OUTPUT
          cat SHA256SUMS >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  brew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: render formula
        env:
          VERSION: ${{ github.ref_name }}
          CHECKSUMS: ${{ needs.release.outputs.checksums }}
        run: |
          v="${VERSION#v}"
          # Pluck the SHA256s out of the checksum block
          mac_arm=$(echo "$CHECKSUMS" | awk '/soda-'"$VERSION"'-darwin-arm64.tar.gz/ {print $1}')
          mac_intel=$(echo "$CHECKSUMS" | awk '/soda-'"$VERSION"'-darwin-amd64.tar.gz/ {print $1}')
          linux_arm=$(echo "$CHECKSUMS" | awk '/soda-'"$VERSION"'-linux-arm64.tar.gz/ {print $1}')
          linux_intel=$(echo "$CHECKSUMS" | awk '/soda-'"$VERSION"'-linux-amd64.tar.gz/ {print $1}')
          cat > soda.rb <<RUBY
          # Generated by .github/workflows/release.yml
          class Soda < Formula
            desc "CLI for Socrata-based open data portals"
            homepage "https://github.com/c-tonneslan/soda"
            version "$v"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/c-tonneslan/soda/releases/download/$VERSION/soda-$VERSION-darwin-arm64.tar.gz"
                sha256 "$mac_arm"
              end
              on_intel do
                url "https://github.com/c-tonneslan/soda/releases/download/$VERSION/soda-$VERSION-darwin-amd64.tar.gz"
                sha256 "$mac_intel"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/c-tonneslan/soda/releases/download/$VERSION/soda-$VERSION-linux-arm64.tar.gz"
                sha256 "$linux_arm"
              end
              on_intel do
                url "https://github.com/c-tonneslan/soda/releases/download/$VERSION/soda-$VERSION-linux-amd64.tar.gz"
                sha256 "$linux_intel"
              end
            end

            def install
              bin.install Dir["soda-*"].first => "soda"
            end

            test do
              assert_match "$v", shell_output("#{bin}/soda --version")
            end
          end
          RUBY
          cat soda.rb
      # If the tap repo exists, push the formula to it. Otherwise upload as a
      # release artifact so the user can paste it in.
      - name: push to tap (if SODA_TAP_TOKEN is set)
        if: ${{ env.SODA_TAP_TOKEN != '' }}
        env:
          SODA_TAP_TOKEN: ${{ secrets.SODA_TAP_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git clone "https://x-access-token:${SODA_TAP_TOKEN}@github.com/c-tonneslan/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp soda.rb tap/Formula/soda.rb
          cd tap
          git add Formula/soda.rb
          git commit -m "soda ${VERSION}"
          git push
